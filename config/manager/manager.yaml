apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubewol
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        prometheus.io/scrape: "true"
        prometheus.io/scheme: "https"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubewol
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      # Pod-level security: minimal, RuntimeDefault seccomp.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            # Uncomment and configure to enable Remote Write push for fast cold start:
            # - --remote-write-url=http://prometheus-server.monitoring.svc:80/api/v1/write
          image: controller:latest
          imagePullPolicy: IfNotPresent
          name: manager
          # hostPort is intentionally NOT declared. With hostNetwork: true the
          # process binds the port directly in the host network namespace, so
          # hostPort is redundant. /metrics is served over HTTPS and gated by
          # Kubernetes TokenReview / SubjectAccessReview; scrapers must present
          # a ServiceAccount token bound to kubewol-metrics-reader.
          ports:
            - containerPort: 8443
              name: https-metrics
            - containerPort: 8081
              name: healthz
          # Container-level security: drop privileged and grant only the
          # minimal capabilities needed for eBPF TC attach and map operations.
          #
          # - CAP_BPF: load eBPF programs, create/update BPF maps
          # - CAP_NET_ADMIN: attach TC (tcx) hooks to network interfaces
          # - CAP_PERFMON: required by the BPF verifier to allow pointer
          #   arithmetic on packet data (parse_l3 skips the Ethernet + VLAN
          #   headers, egress_rst_filter walks inner IP payload). Without it
          #   the verifier rejects programs with "pointer arithmetic with it
          #   prohibited for !root". Not related to perf_event_open.
          #
          # CAP_SYS_RESOURCE was previously added to raise RLIMIT_MEMLOCK on
          # kernels <5.11. This project targets kernel 6.6+ (TCX), where BPF
          # memory accounting is cgroup-based and CAP_BPF already bypasses the
          # memlock rlimit, so the capability is no longer required.
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            # eBPF load/attach is gated on file capabilities, not UID: with
            # CAP_BPF + CAP_NET_ADMIN (+ CAP_PERFMON) a non-root user can
            # bpf(BPF_PROG_LOAD) and AttachTCX just fine. Running as an
            # unprivileged user shrinks the blast radius of a container escape.
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
              add:
                - BPF
                - NET_ADMIN
                - PERFMON
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
