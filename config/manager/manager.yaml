apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
  name: system
---
# ─────────────────────────────────────────────────────────────────────────────
# kubewol agent (DaemonSet)
#
# Owns the eBPF programs, the BPF maps and the ring buffer reader. Runs on
# every node with hostNetwork + CAP_BPF + CAP_NET_ADMIN. Exposes the agent
# kubewol.v1.Agent gRPC service (PutWatches, SubscribeSynEvents) on port 8444
# and a Prometheus /metrics endpoint on port 8443 via controller-runtime's
# TLS + TokenReview server.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: agent
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: agent
spec:
  # Headless Service so the controller can enumerate every agent Pod via
  # EndpointSlice and open direct connections to each node's agent.
  clusterIP: None
  selector:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: agent
  ports:
    - name: https-metrics
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: grpc
      port: 8444
      targetPort: 8444
      protocol: TCP
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agent
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubewol
      app.kubernetes.io/component: agent
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        prometheus.io/scrape: "true"
        prometheus.io/scheme: "https"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
      labels:
        app.kubernetes.io/name: kubewol
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: controller:latest
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --mode=agent
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --agent-grpc-bind-address=:8444
            # The audience-bound TokenReview alone is not sufficient
            # authorization because any workload in the cluster can mint a
            # projected token for its own ServiceAccount with that audience.
            # Pin the allowed caller to the controller Deployment's SA
            # (this is the post-kustomize name, kubewol-controller@kubewol-system).
            - --agent-allowed-callers=system:serviceaccount:kubewol-system:kubewol-controller
            # Enable Remote Write push for fast cold start:
            # - --remote-write-url=http://prometheus-server.monitoring.svc:80/api/v1/write
          ports:
            - containerPort: 8443
              name: https-metrics
            - containerPort: 8444
              name: grpc
            - containerPort: 8081
              name: healthz
          # CAP_BPF: load eBPF programs, create/update BPF maps.
          # CAP_NET_ADMIN: attach TC (tcx) hooks to network interfaces.
          # PERFMON / SYS_RESOURCE are NOT required: the BPF program avoids
          # pointer arithmetic on packet data (bpf_skb_load_bytes only) and
          # kernel 6.6+ lets CAP_BPF bypass the memlock rlimit. See
          # bpf/monitor.c for the verifier-friendly rewrite.
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
              add:
                - BPF
                - NET_ADMIN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      terminationGracePeriodSeconds: 10
---
# ─────────────────────────────────────────────────────────────────────────────
# kubewol controller (Deployment)
#
# Runs the Kubernetes API reconcile loop, discovers agents via the headless
# Service above, pushes WatchSpec snapshots to each agent, and triggers
# direct-scale on SYN events streamed back over gRPC. Zero privileges: no
# hostNetwork, no capabilities, no root, no BPF access.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: controller
---
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: controller
spec:
  selector:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: controller
  ports:
    - name: https-metrics
      port: 8443
      targetPort: 8443
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubewol
      app.kubernetes.io/component: controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        prometheus.io/scrape: "true"
        prometheus.io/scheme: "https"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
      labels:
        app.kubernetes.io/name: kubewol
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # Audience-bound projected ServiceAccount token. The token's aud
        # claim is kubewol.io/agent-api, which the agent enforces via a
        # TokenReview with matching spec.audiences. A bearer token stolen
        # from a compromised network path can therefore only be replayed
        # against kubewol agents, not against kube-apiserver or any other
        # audience-unchecked in-cluster service.
        - name: agent-api-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: kubewol.io/agent-api
                  expirationSeconds: 3600
                  path: token
      containers:
        - name: manager
          image: controller:latest
          imagePullPolicy: IfNotPresent
          command:
            # Use the non-setcap copy: NoNewPrivs (implied by
            # allowPrivilegeEscalation: false) makes the kernel refuse exec of
            # a binary that has file capabilities unless those caps are in the
            # bounding set — which this unprivileged pod deliberately does not
            # grant. /manager-plain is a byte-identical copy without setcap.
            - /manager-plain
          args:
            - --mode=controller
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --agent-namespace=$(POD_NAMESPACE)
            - --agent-service=kubewol-agent
            - --agent-port=8444
          volumeMounts:
            - name: agent-api-token
              mountPath: /var/run/secrets/kubewol/agent-api
              readOnly: true
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8443
              name: https-metrics
            - containerPort: 8081
              name: healthz
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      terminationGracePeriodSeconds: 10
