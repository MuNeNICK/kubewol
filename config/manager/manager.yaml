apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubewol
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubewol
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      # Pod-level security: minimal, RuntimeDefault seccomp.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:9090
            # Uncomment and configure to enable Remote Write push for fast cold start:
            # - --remote-write-url=http://prometheus-server.monitoring.svc:80/api/v1/write
          image: controller:latest
          imagePullPolicy: IfNotPresent
          name: manager
          # Note: hostPort is intentionally NOT declared. With hostNetwork: true the
          # process binds the port directly in the host network namespace, so hostPort
          # is redundant and only inflates the apparent attack surface. The /metrics
          # endpoint is unauthenticated; restrict access via the provided NetworkPolicy
          # at config/network-policy/allow-metrics-traffic.yaml.
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8081
              name: healthz
          # Container-level security: drop privileged and grant only the
          # minimal capabilities needed for eBPF TC attach and map operations.
          #
          # - CAP_BPF: load/attach eBPF programs, create/update BPF maps
          # - CAP_NET_ADMIN: attach TC (tcx) hooks to network interfaces
          # - CAP_PERFMON: allow bpf() syscalls for program loading (kernel 5.8+)
          # - CAP_SYS_RESOURCE: raise RLIMIT_MEMLOCK for older kernels (5.11-)
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false # eBPF load requires root in the pod UTS namespace
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - BPF
                - NET_ADMIN
                - PERFMON
                - SYS_RESOURCE
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
