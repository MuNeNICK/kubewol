# Defense-in-depth: restricts ingress to the kubewol /metrics endpoint (8443).
#
# The endpoint is already protected by Kubernetes TokenReview +
# SubjectAccessReview (see config/rbac/metrics_auth_role.yaml and
# metrics_reader_role.yaml) and served over HTTPS, so an attacker who reaches
# the port still needs a ServiceAccount token bound to kubewol-metrics-reader.
# This NetworkPolicy narrows the exposure further on CNIs that honor
# NetworkPolicy for host-networked pods (e.g. Calico).
#
# Label your Prometheus namespace to allow scraping:
#   kubectl label ns monitoring kubewol-metrics=scraper
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-traffic
  namespace: system
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubewol
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubewol-metrics: scraper
      ports:
        - port: 8443
          protocol: TCP
