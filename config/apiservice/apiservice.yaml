apiVersion: v1
kind: Service
metadata:
  name: controller-manager-api
  namespace: system
spec:
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: kubewol
  ports:
    - port: 443
      targetPort: 6443
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.external.metrics.k8s.io
spec:
  service:
    name: controller-manager-api
    namespace: system
  group: external.metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
