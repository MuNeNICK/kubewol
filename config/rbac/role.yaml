---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - list
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - list
  - watch
- apiGroups:
  - ebpf.munenick.dev
  resources:
  - scaletozeroes
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ebpf.munenick.dev
  resources:
  - scaletozeroes/status
  verbs:
  - get
  - patch
  - update
