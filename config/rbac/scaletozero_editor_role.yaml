# This rule is not used by the project kubewol itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ebpf.munenick.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/managed-by: kustomize
  name: scaletozero-editor-role
rules:
- apiGroups:
  - ebpf.munenick.dev
  resources:
  - scaletozeroes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ebpf.munenick.dev
  resources:
  - scaletozeroes/status
  verbs:
  - get
