---
# ClusterRole that grants the controller ServiceAccount access to the agent's
# private HTTP API paths through the TokenReview / SubjectAccessReview filter
# that controller-runtime's metrics server installs.
#
# The agent mounts /v1/watches and /v1/syn-events as ExtraHandlers on the same
# TLS listener as /metrics, so requests are authorized via SAR against the
# corresponding nonResourceURL. Without this ClusterRole the controller would
# be authenticated but the SAR check would return 403.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-api-client
  labels:
    app.kubernetes.io/name: kubewol
rules:
  # Verbs are lower-cased HTTP methods because the controller-runtime
  # metrics filter passes strings.ToLower(req.Method) as the SAR verb,
  # not the REST conventional verbs.
  - nonResourceURLs:
      - "/v1/watches"
    verbs:
      - put
  - nonResourceURLs:
      - "/v1/syn-events"
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-api-client
  labels:
    app.kubernetes.io/name: kubewol
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-api-client
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: system
