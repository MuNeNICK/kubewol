# This rule is not used by the project ebpf-scale-to-zero itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to ebpf.munenick.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ebpf-scale-to-zero
    app.kubernetes.io/managed-by: kustomize
  name: scaletozero-viewer-role
rules:
- apiGroups:
  - ebpf.munenick.dev
  resources:
  - scaletozeroes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ebpf.munenick.dev
  resources:
  - scaletozeroes/status
  verbs:
  - get
