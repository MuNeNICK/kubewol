resources:
# ServiceAccounts are defined alongside each workload in config/manager/manager.yaml.
# This directory holds the cluster-wide Role / ClusterRoleBinding for each SA.
- role.yaml
- role_binding.yaml
# RBAC that protects the /metrics endpoint with TokenReview / SubjectAccessReview.
# Both the agent and the controller mount the same pair of bindings because
# both workloads expose /metrics through controller-runtime's filter.
- metrics_auth_role.yaml
- metrics_auth_role_binding.yaml
- metrics_reader_role.yaml
# Grants the controller SA access to the agent's private HTTP API.
- agent_api_role.yaml

