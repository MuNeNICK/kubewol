---
# ClusterRole for the direct-scale fast path.
#
# THREAT MODEL:
# This role grants write access to the /scale subresource on Deployments and
# StatefulSets cluster-wide. The kubewol DaemonSet runs on every node, so a
# compromise of any node-local pod yields cluster-wide scale authority over
# every Deployment and StatefulSet.
#
# In-process annotation checks (kubewol/direct-scale on both the Service and
# the target workload) reduce ACCIDENTAL misuse by legitimate operators, but
# they are not a security boundary against an attacker who has code execution
# in the controller pod.
#
# Mitigations to consider before applying this in production:
#   1. Skip direct-scale entirely. The default kubewol install only observes
#      traffic and feeds metrics to HPA, which uses normal HPA credentials.
#      Cold start is ~19s instead of ~3s.
#   2. Restrict the binding to specific namespaces by replacing this
#      ClusterRoleBinding with namespace-scoped RoleBindings, and run a
#      separate kubewol install per scope. The ClusterRole itself can stay,
#      but the binding only grants the privilege within the bound namespaces.
#   3. Use ValidatingAdmissionPolicy to restrict which workloads the
#      kubewol ServiceAccount may patch.
#
# Without this role applied, TriggerScale calls will fail with a forbidden
# error and kubewol falls back to HPA-only behavior.
#
# Usage:
#   kubectl apply -f https://.../direct_scale_role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubewol-direct-scale
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: direct-scale
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubewol-direct-scale
  labels:
    app.kubernetes.io/name: kubewol
    app.kubernetes.io/component: direct-scale
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubewol-direct-scale
subjects:
  - kind: ServiceAccount
    name: kubewol-controller-manager
    namespace: kubewol-system
