name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install clang and kernel headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-generic gcc-multilib

      - name: Compile eBPF
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ASM_INCLUDE="/usr/include/x86_64-linux-gnu" ;;
            aarch64) ASM_INCLUDE="/usr/include/aarch64-linux-gnu" ;;
            *) ASM_INCLUDE="/usr/include/$ARCH-linux-gnu" ;;
          esac
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include \
            -I"$ASM_INCLUDE" \
            -c bpf/monitor.c \
            -o internal/ebpf/monitor.o

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate install manifest
        run: |
          cd config/manager && kustomize edit set image controller=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cd ../..
          kustomize build config/default > install.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: install.yaml
